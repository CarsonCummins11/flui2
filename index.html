<!DOCTYPE html>
<html>
    <head>
        <style>
            @import url('http://fonts.cdnfonts.com/css/optician-sans');
            @font-face {
font-family:"poppins";
src:url("https://use.typekit.net/af/0d0f8f/00000000000000007735c199/30/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),url("https://use.typekit.net/af/0d0f8f/00000000000000007735c199/30/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff"),url("https://use.typekit.net/af/0d0f8f/00000000000000007735c199/30/a?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("opentype");
font-display:auto;font-style:normal;font-weight:400;
}
            body,html{
                margin: 0;
                padding: 0;
            }
            .full_screen{
                display: flex;
                justify-content: center;
                align-items: center;
                width:100vw;
                height: 100vh;
                padding: 0;
                margin: 0;
                background-color: white;
            }
            .option_card{
                height: max(580px,41.5vw);
                width: max(540,34.5vw);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                font-family: 'Optician Sans', sans-serif;
                font-size: max(112px,8vw);
                color: #161616;

            }
            .marbling{
                background-image: url("marbling.png");
                width: max(70px,5vw);
                height:max(70px,5vw);
                border-radius: 50%;
                box-shadow: 0px 0px 12px 0px rgba(0, 0, 0, .28);;
            }
            .c_button{
                border: 3px solid #161616;
                color: #161616;
                width: max(196px,14vw);
                padding-top: max(4px,.3vw);
                padding-bottom: max(4px,.3vw);
                font-family: "poppins";
                font-size: max(28px,2vw);
                text-decoration: none;
                text-align: center;
                margin-top: max(40px,3vw);
                transition: .5s;
            }
            .c_button:hover{
                background-color: #161616;
                color: white;
                transition: .5s;
                transform: scaleX(1.1) scaleY(1.1)
            }
        </style>
    </head>
    <body>
        <div class="full_screen">
            <div class="option_card">
                <div class="marbling"></div>
                FLUI
                <a style="margin-top: max(42px,3vw);"class="c_button" href="influencers/influencer.html">
                    INFLUENCER
                </a>
                <a class="c_button" href="companies/company.html">
                    BUSINESS
                </a>
            </div>
        </div>
    </body>
</html>
